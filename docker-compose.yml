# Local-development Docker Compose stack.
# Resource limits are intentionally conservative for laptop usage. Increase them
# on stronger machines, or stop optional services when testing one layer only.

x-airflow-common: &airflow-common
  image: starrock-dataflow-airflow:local
  pull_policy: never
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-postgres:
      condition: service_healthy
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "${AIRFLOW__CORE__LOAD_EXAMPLES:-false}"
    AIRFLOW__CORE__PARALLELISM: "${AIRFLOW__CORE__PARALLELISM:-2}"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "${AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG:-1}"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY: "${AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY:-1}"
    DBT_PROJECT_DIR: "${DBT_PROJECT_DIR:-/opt/airflow/dbt/hotel_booking}"
    DBT_PROFILES_DIR: "${DBT_PROFILES_DIR:-/opt/airflow/dbt/hotel_booking}"
    DBT_TARGET: "${DBT_TARGET:-dev}"
    DBT_THREADS: "${DBT_THREADS:-1}"
    MINIO_ENDPOINT: "${MINIO_ENDPOINT:-minio:9000}"
    MINIO_BUCKET: "${MINIO_BUCKET:-hotel-booking-raw}"
    MINIO_WAREHOUSE_BUCKET: "${MINIO_WAREHOUSE_BUCKET:-warehouse}"
    MINIO_BATCH_PREFIX: "${MINIO_BATCH_PREFIX:-hotel_booking_demand/incremental_batches}"
    MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
    MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    MINIO_RAW_OBJECT_KEY: "${MINIO_RAW_OBJECT_KEY:-hotel_booking_demand/hotel_bookings.csv}"
    ICEBERG_REST_URI: "${ICEBERG_REST_URI:-http://iceberg-rest:8181}"
    ICEBERG_CATALOG_NAME: "${ICEBERG_CATALOG_NAME:-iceberg_catalog}"
    ICEBERG_DATABASE: "${ICEBERG_DATABASE:-hotel_booking_lakehouse}"
    ICEBERG_RAW_HISTORY_TABLE: "${ICEBERG_RAW_HISTORY_TABLE:-raw_hotel_bookings_history}"
    ICEBERG_WAREHOUSE: "${ICEBERG_WAREHOUSE:-s3://warehouse/}"
    MINIO_ENDPOINT_URL: "${MINIO_ENDPOINT_URL:-http://minio:9000}"
    AWS_REGION: "${AWS_REGION:-us-east-1}"
    AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
    AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    SPARK_MASTER: "${SPARK_MASTER:-local[1]}"
    SPARK_DRIVER_MEMORY: "${SPARK_DRIVER_MEMORY:-768m}"
    SPARK_EXECUTOR_MEMORY: "${SPARK_EXECUTOR_MEMORY:-768m}"
    SPARK_SQL_SHUFFLE_PARTITIONS: "${SPARK_SQL_SHUFFLE_PARTITIONS:-4}"
    STARROCKS_HOST: "${STARROCKS_HOST:-starrocks}"
    STARROCKS_QUERY_PORT: "${STARROCKS_QUERY_PORT:-9030}"
    STARROCKS_HTTP_PORT: "${STARROCKS_HTTP_PORT:-8030}"
    STARROCKS_USER: "${STARROCKS_USER:-root}"
    STARROCKS_PASSWORD: "${STARROCKS_PASSWORD:-}"
    STARROCKS_CATALOG: "${STARROCKS_CATALOG:-default_catalog}"
    STARROCKS_DATABASE: "${STARROCKS_DATABASE:-hotel_booking}"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/include:/opt/airflow/include
    - ./airflow/logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./docs:/opt/airflow/docs
    - ./scripts:/opt/airflow/scripts
    - ./starrocks:/opt/airflow/starrocks
    - ./dbt:/opt/airflow/dbt
  networks:
    - data_network
  # Airflow also runs a local PySpark ingestion task in this MVP, so it needs
  # a little more memory than a metadata-only scheduler/webserver.
  mem_limit: 2g
  mem_reservation: 768m

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      data_network:
        aliases:
          - warehouse.minio
    mem_limit: 512m
    mem_reservation: 256m

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-hotel-booking-raw};
      mc anonymous set none local/${MINIO_BUCKET:-hotel-booking-raw};
      mc mb --ignore-existing local/${MINIO_WAREHOUSE_BUCKET:-warehouse};
      mc anonymous set none local/${MINIO_WAREHOUSE_BUCKET:-warehouse};
      "
    networks:
      - data_network
    mem_limit: 128m
    mem_reservation: 64m
    restart: "no"

  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    depends_on:
      - minio-init
    environment:
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: "s3://${MINIO_WAREHOUSE_BUCKET:-warehouse}/"
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "${ICEBERG_REST_PORT:-8181}:8181"
    networks:
      data_network:
        aliases:
          - iceberg-rest.minio
    mem_limit: 512m
    mem_reservation: 256m

  starrocks:
    image: starrocks/allin1-ubuntu:latest
    # The official all-in-one image is used for local learning/POC only.
    # StarRocks-specific memory env vars are intentionally not invented here;
    # use Docker memory limits first unless the selected image documents more.
    ports:
      - "${STARROCKS_QUERY_PORT:-9030}:9030"
      - "${STARROCKS_HTTP_PORT:-8030}:8030"
      - "8040:8040"
    volumes:
      # Persist StarRocks FE metadata and BE storage for local development.
      # docker compose down keeps these named volumes; docker compose down -v deletes them.
      - starrocks_fe_meta:/data/deploy/starrocks/fe/meta
      - starrocks_be_storage:/data/deploy/starrocks/be/storage
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "mysql -P9030 -h127.0.0.1 -uroot -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s
    mem_limit: 3g
    mem_reservation: 2g

  airflow-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    mem_reservation: 256m

  airflow-init:
    <<: *airflow-common
    build:
      context: ./docker/airflow
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Local \
          --lastname Admin \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "${AIRFLOW_WEB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped

  superset:
    build:
      context: ./docker/superset
    image: starrock-dataflow-superset:local
    environment:
      SUPERSET_SECRET_KEY: "${SUPERSET_SECRET_KEY:-change-me-for-local-dev}"
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_ADMIN_USERNAME: "${SUPERSET_ADMIN_USERNAME:-admin}"
      SUPERSET_ADMIN_PASSWORD: "${SUPERSET_ADMIN_PASSWORD:-admin}"
      SUPERSET_ADMIN_EMAIL: "${SUPERSET_ADMIN_EMAIL:-admin@example.com}"
      SUPERSET_STARROCKS_SQLALCHEMY_URI: "${SUPERSET_STARROCKS_SQLALCHEMY_URI:-starrocks://root:@starrocks:9030/default_catalog.hotel_booking}"
      SUPERSET_STARROCKS_DATABASE_NAME: "${SUPERSET_STARROCKS_DATABASE_NAME:-StarRocks Hotel Booking}"
      SUPERSET_STARROCKS_SCHEMA: "${SUPERSET_STARROCKS_SCHEMA:-hotel_booking}"
      SUPERSET_DASHBOARD_TITLE: "${SUPERSET_DASHBOARD_TITLE:-Hotel Booking BI Dashboard}"
      SUPERSET_DASHBOARD_SLUG: "${SUPERSET_DASHBOARD_SLUG:-hotel-booking-bi-dashboard}"
    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USERNAME:-admin}" \
          --firstname Local \
          --lastname Admin \
          --email "${SUPERSET_ADMIN_EMAIL:-admin@example.com}" \
          --password "${SUPERSET_ADMIN_PASSWORD:-admin}" || true
        superset init
        superset run -h 0.0.0.0 -p 8088
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./scripts:/app/bootstrap_scripts:ro
    depends_on:
      starrocks:
        condition: service_started
    networks:
      - data_network
    mem_limit: 1g
    mem_reservation: 512m
    restart: unless-stopped

networks:
  data_network:
    name: data_network
    driver: bridge

volumes:
  minio_data:
  starrocks_fe_meta:
  starrocks_be_storage:
  airflow_postgres_data:
  superset_home:
